<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Hello there grocery — Sign up</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(20, 184, 166, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56, 189, 248, 0.12) 0%, transparent 50%),
        #0b0f14;
      color: #e8edf2;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .emoji-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .emoji-bg span {
      position: absolute;
      font-size: 2.25rem;
      opacity: 0.18;
      user-select: none;
      line-height: 1;
      animation: float 8s ease-in-out infinite;
    }

    .emoji-bg span:nth-child(1)  { top: 8%;  left: 6%;  font-size: 2.5rem; animation-delay: 0s; }
    .emoji-bg span:nth-child(2)  { top: 14%; right: 10%; font-size: 2rem;  animation-delay: 1.2s; }
    .emoji-bg span:nth-child(3)  { top: 28%; left: 14%; font-size: 1.75rem; animation-delay: 0.6s; }
    .emoji-bg span:nth-child(4)  { top: 22%; right: 22%; font-size: 2.25rem; animation-delay: 2s; }
    .emoji-bg span:nth-child(5)  { top: 48%; left: 4%;  font-size: 2rem;  animation-delay: 1.5s; }
    .emoji-bg span:nth-child(6)  { top: 55%; right: 7%; font-size: 2.5rem; animation-delay: 0.3s; }
    .emoji-bg span:nth-child(7)  { top: 68%; left: 12%; font-size: 1.9rem; animation-delay: 2.4s; }
    .emoji-bg span:nth-child(8)  { top: 72%; right: 16%; font-size: 2.1rem; animation-delay: 1s; }
    .emoji-bg span:nth-child(9)  { top: 85%; left: 28%; font-size: 1.8rem; animation-delay: 1.8s; }
    .emoji-bg span:nth-child(10) { top: 88%; right: 30%; font-size: 2.3rem; animation-delay: 0.9s; }
    .emoji-bg span:nth-child(11) { top: 40%; left: 88%; font-size: 1.7rem; animation-delay: 2.1s; }
    .emoji-bg span:nth-child(12) { top: 5%;  left: 45%; font-size: 2rem;  animation-delay: 1.4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(6deg); }
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .site-footer {
      width: 100%;
      max-width: 380px;
      margin-top: 1.5rem;
      padding: 1rem 0 0.25rem;
      text-align: center;
      font-size: 0.8rem;
      color: #5c6b7e;
      border-top: 1px solid #1e2836;
      position: relative;
      z-index: 1;
    }

    .site-footer a {
      color: #8b9bb0;
      text-decoration: none;
      margin: 0 0.5rem;
    }

    .site-footer a:hover {
      color: #2dd4bf;
      text-decoration: underline;
    }

    .site-footer .links {
      margin-bottom: 0.5rem;
    }

    .site-footer .copy {
      color: #4a5568;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: #141a22;
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
      position: relative;
      z-index: 1;
    }

    .login-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      text-align: center;
      color: #f1f5f9;
    }

    .store-name {
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
      color: #2dd4bf;
      margin-bottom: 1.25rem;
    }

    .store-name span {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8b9bb0;
      margin-top: 0.25rem;
    }

    .login-card .subtitle {
      text-align: center;
      color: #8b9bb0;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #c5d0de;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1.5px solid #2a3648;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      background: #0f141b;
      color: #e8edf2;
    }

    .form-group input::placeholder {
      color: #5c6b7e;
    }

    .form-group input:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
      background: #111820;
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #8b9bb0;
      cursor: pointer;
    }

    .remember input {
      width: 1rem;
      height: 1rem;
      accent-color: #14b8a6;
      cursor: pointer;
    }

    .forgot {
      color: #2dd4bf;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
      color: #5eead4;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      color: #042f2e;
      background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(45, 212, 191, 0.2);
    }

    .btn-login:hover {
      opacity: 0.95;
      box-shadow: 0 10px 28px rgba(45, 212, 191, 0.3);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      color: #2dd4bf;
      background: transparent;
      border: 1.5px solid #2a3648;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-secondary:hover {
      border-color: #14b8a6;
      background: rgba(20, 184, 166, 0.08);
      color: #5eead4;
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .terms-check {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      color: #8b9bb0;
      cursor: pointer;
      line-height: 1.4;
    }

    .terms-check input {
      width: 1rem;
      height: 1rem;
      margin-top: 0.15rem;
      flex-shrink: 0;
      accent-color: #14b8a6;
      cursor: pointer;
    }

    .terms-check a {
      color: #2dd4bf;
      text-decoration: none;
      font-weight: 500;
    }

    .terms-check a:hover {
      text-decoration: underline;
      color: #5eead4;
    }

    .signin-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #8b9bb0;
    }

    .signin-link a {
      color: #2dd4bf;
      font-weight: 600;
      text-decoration: none;
    }

    .signin-link a:hover {
      text-decoration: underline;
      color: #5eead4;
    }

    #message {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      text-align: center;
    }

    #message.success {
      display: block;
      background: rgba(16, 185, 129, 0.12);
      color: #6ee7b7;
      border: 1px solid rgba(52, 211, 153, 0.35);
    }

    #message.error {
      display: block;
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      border: 1px solid rgba(248, 113, 113, 0.35);
    }
  </style>
</head>
<body>
  <div class="emoji-bg" aria-hidden="true">
    <span>🛒</span>
    <span>🍎</span>
    <span>🥦</span>
    <span>🥖</span>
    <span>🧀</span>
    <span>🥛</span>
    <span>🥕</span>
    <span>🍊</span>
    <span>🥑</span>
    <span>🍇</span>
    <span>🍅</span>
    <span>🥬</span>
  </div>

  <div class="page">
    <div class="login-card">
      <p class="store-name">
        Hello there grocery
        <span>Fresh • Local • Friendly</span>
      </p>
      <h1>Create account</h1>
      <p class="subtitle">Join Hello there grocery today</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter your password"
            autocomplete="new-password"
            required
          />
        </div>

        <label class="terms-check">
          <input type="checkbox" id="terms" name="terms" />
          <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn-login">Sign up</button>
        <a href="login.html" class="btn-secondary">Back to sign in</a>
      </form>

      <div id="message" role="status"></div>

      <p class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Help</a>
    </div>
    <p class="copy">&copy; 2026 Hello there grocery. All rights reserved.</p>
  </footer>

  <script>
    const form = document.getElementById("signupForm");
    const message = document.getElementById("message");
    const submitBtn = form.querySelector('button[type="submit"]');

    // Use grocery server when page is not already served from it
    // (e.g. opened as file:// or via Live Server on another port)
    const API_BASE =
      window.location.protocol.startsWith("http") && window.location.port === "8000"
        ? ""
        : "http://127.0.0.1:8000";

    function showMessage(text, type) {
      message.textContent = text;
      message.className = type;
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Creating account…" : "Sign up";
    }

    async function readApiResponse(res) {
      const text = await res.text();
      if (!text) {
        return {
          ok: false,
          error:
            "Empty response from server (HTTP " +
            res.status +
            "). Open http://127.0.0.1:8000/signup.html and ensure python server.py is running.",
        };
      }
      try {
        return JSON.parse(text);
      } catch (_) {
        return {
          ok: false,
          error:
            "Invalid server response (HTTP " +
            res.status +
            "). Open http://127.0.0.1:8000/signup.html — do not open the HTML file directly.",
        };
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const terms = document.getElementById("terms").checked;

      message.className = "";
      message.textContent = "";

      if (!name || !email || !password || !confirmPassword) {
        showMessage("Please fill in all fields.", "error");
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage("Please enter a valid email address.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      if (!terms) {
        showMessage("Please agree to the Terms and Privacy Policy.", "error");
        return;
      }

      setLoading(true);
      try {
        const res = await fetch(API_BASE + "/api/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: name,
            email: email,
            password: password,
            confirmPassword: confirmPassword,
            terms: terms,
          }),
        });
        const data = await readApiResponse(res);

        if (!res.ok || !data.ok) {
          showMessage(data.error || "Sign up failed.", "error");
          return;
        }

        showMessage("Account created! Redirecting to sign in…", "success");
        setTimeout(function () {
          window.location.href = "login.html";
        }, 1200);
      } catch (err) {
        showMessage(
          "Cannot reach server at http://127.0.0.1:8000. Run: python server.py",
          "error"
        );
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
