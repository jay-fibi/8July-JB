<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Hello there grocery — Welcome</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(20, 184, 166, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56, 189, 248, 0.12) 0%, transparent 50%),
        #0b0f14;
      color: #e8edf2;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #141a22;
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
      text-align: center;
    }
    .store {
      color: #2dd4bf;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: #f1f5f9;
    }
    .email {
      color: #8b9bb0;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #042f2e;
      background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="card">
    <p class="store">Hello there grocery</p>
    <h1 id="greeting">Welcome!</h1>
    <p class="email" id="emailLine"></p>
    <a class="btn" href="home.html" style="margin-right:0.75rem;">Go to store</a>
    <button type="button" class="btn" id="logoutBtn" onclick="(function(){try{sessionStorage.removeItem('groceryUser');}catch(e){}window.location.replace('login.html');})()">Sign out</button>
  </div>
  <script>
    (function () {
      var user = null;
      try {
        user = JSON.parse(sessionStorage.getItem("groceryUser") || "null");
      } catch (e) {
        user = null;
      }
      if (!user || !user.name) {
        window.location.replace("login.html");
        return;
      }
      document.getElementById("greeting").textContent = "Welcome, " + user.name + "!";
      document.getElementById("emailLine").textContent = user.email || "";

      function doLogout(e) {
        if (e) e.preventDefault();
        try {
          sessionStorage.removeItem("groceryUser");
        } catch (err) {}
        window.location.replace("login.html");
      }

      var logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.type = "button";
        logoutBtn.addEventListener("click", doLogout);
      }
    })();
  </script>
</body>
</html>
